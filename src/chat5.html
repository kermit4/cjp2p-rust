<html><head><title>OnePlusOne real time chat over CJP2P</title></head>
        <body>
            <p><a href=/>return to network status page</a>
        <p>try /ping or /version

<button id="connect-btn">Connect an Ethereum Wallet</button> to 
<button id="sign-btn">Sign your ed25519 public key</button>
sender: <span id="verify">not verified yet</span>
        <div style='display: flex; height: 100vh;'>
            <textarea id='input' style='width: 50%; height: 60%;'></textarea>
            <textarea id='output' style='width: 50%; height: 60%;' readonly></textarea>
        </div>
	
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
        <script>
// No import needed. ethers is now window.ethers
const parts = window.location.href.split('?');
const SAFE_ADDRESS = parts[1];
async function getSigners() {
const accounts = await window.ethereum.request({ method: 'eth_accounts' });
const my_eth_address = accounts[0];
  const provider = new ethers.BrowserProvider(window.ethereum)
  const abi = ["function getOwners() view returns (address[])"]
  const safe = new ethers.Contract(SAFE_ADDRESS, abi, provider)
  const owners = await safe.getOwners()
owners.forEach(function(v,k)   { if (v.toUpperCase()!=my_eth_address.toUpperCase()) alert("their eth addr"+v) } );
  document.body.innerHTML += owners.join("<br>")
  document.body.innerHTML += "<br>yours: ";
  document.body.innerHTML += my_eth_address;
}

            let originalTitle = document.title;
            let blinkInterval;
            function notifyNewMessage() {
                let blinkCount = 0;
                clearInterval(blinkInterval);
                blinkInterval = setInterval(() => {
                    document.title = (blinkCount % 2 === 0) ? "(New Message!) " + originalTitle : originalTitle;
                    blinkCount++;
                }, 1000);
            };
            window.addEventListener('focus', () => {
                clearInterval(blinkInterval);
                document.title = originalTitle;
            });

  let account;

  document.getElementById('connect-btn').addEventListener('click', async () => {
    if (!window.ethereum) {
      alert('Install MetaMask!');
      return;
    }
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    document.getElementById('connect-btn').disabled = true;
	getSigners();
  });



  document.getElementById('sign-btn').addEventListener('click', async () => {
    let edsign = "EDSIGN:" + await window.ethereum.request({
      method: 'personal_sign',
      params: ["my ed25519 public key is ",account],
    });
    socket.send(edsign);
  });






            const url = new URL('/wt', window.location.href);
            url.protocol = url.protocol.replace('http', 'ws');
            let socket;
            const input = document.getElementById('input');
            const output = document.getElementById('output');
            function connect() {
                output.value="websocket connencting";
                socket = new WebSocket(url.href);
                socket.onopen = () => { 
                    socket.send("0x123"); 
                };
                socket.onclose = () => {
                    console.log('Socket closed. Reconnecting ...');
                    output.value="websocket reconnencting";
                    setTimeout(connect, 120);
                };
                const verify = document.getElementById('verify');
                socket.onmessage = async(event) => { 
   //                 const parts = event.data.split(':');
//                   if (parts[0] == "EDSIGN") {
 //                      verify.innerText = await window.ethereum.request({ method: 'personal_ecRecover', params: ["my ed25519 public key is ",parts[1]] });
  //                 } else 
     {
let messages = JSON.parse(event.data);
         for (i in messages) {
             if ("ChatMessage" in messages[i]) {
                 output.value = messages[i].ChatMessage.message
  }
}
                    notifyNewMessage();
}
                };
            }
            connect();
            input.addEventListener('input', () => { 
                socket.send(JSON.stringify([{ChatMessage:{message:input.value}}]  )); });
        </script>
    </body>
