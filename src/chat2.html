<html><head><title>cjp2p real time chat with {}</title></head>
        <body>
        If they can't find you through main page, the URL they need to get here (not the same as yours) is 
        <p><a href=http://127.0.0.1:24255/chat2/{}>http://127.0.0.1:24255/chat2/{}</a>
        <p><a href=/chat/{}>click here</a> to switch to line by line mode</a>
        <p><a href=/chat3/{}>click here</a> to switch to single window mode</a>
        <p>try /ping or /version
        <div style='display: flex; height: 100vh;'>
            <textarea id='input' style='width: 50%; height: 60%;'></textarea>
            <textarea id='output' style='width: 50%; height: 60%;' readonly></textarea>
        </div>
	


<button id="connect-btn">Connect Wallet</button>
<button id="sign-btn">Sign your ED25519 public key {} with your Eth key</button>




<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
        <script>
            let originalTitle = document.title;
            let blinkInterval;
            function notifyNewMessage() {{
                let blinkCount = 0;
                clearInterval(blinkInterval);
                blinkInterval = setInterval(() => {{
                    document.title = (blinkCount % 2 === 0) ? "(New Message!) " + originalTitle : originalTitle;
                    blinkCount++;
                }}, 1000);
            }};
            window.addEventListener('focus', () => {{
                clearInterval(blinkInterval);
                document.title = originalTitle;
            }});

  let account;

  document.getElementById('connect-btn').addEventListener('click', async () => {{
    if (!window.ethereum) {{
      alert('Install MetaMask!');
      return;
    }}
    const accounts = await window.ethereum.request({{ method: 'eth_requestAccounts' }});
    account = accounts[0];
    document.getElementById('connect-btn').disabled = true;
    document.getElementById('sign-btn').disabled = false;
  }});

  document.getElementById('sign-btn').addEventListener('click', async () => {{
    const message = '{} really is me.';
    const signature = await window.ethereum.request({{
      method: 'personal_sign',
      params: [message, account],
    }});
    input.value=signature;
  }});






            const url = new URL('/ws', window.location.href);
            url.protocol = url.protocol.replace('http', 'ws');
            let socket;
            const input = document.getElementById('input');
            const output = document.getElementById('output');
            function connect() {{
                output.value="websocket connencting";
                socket = new WebSocket(url.href);
                socket.onopen = () => {{ 
                    socket.send("{}"); 
                    output.value={};
                }};
                socket.onclose = () => {{
                    console.log('Socket closed. Reconnecting ...');
                    output.value="websocket reconnencting";
                    setTimeout(connect, 120);
                }};
                socket.onmessage = event => {{ 
                    notifyNewMessage();
                    output.value = event.data; 
                }};
            }};
            connect();
            input.addEventListener('input', () => {{ 
                socket.send(input.value); }});
        </script>
    </body>
</html>
