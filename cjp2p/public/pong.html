<html><head><title>Pong over CJP2P</title></head>
<body>
<p>Their ed25519 addr: <input id=their_ed25519 size=80>
<p>Share this link with your opponent: <a id=link href=""></a>
<p><a href=/>return to network status page</a>
<p>
<span id=serve_hint style="display:none;color:#0f0;font-family:monospace;font-size:14px;">&#x25ba; Tap the ball to serve</span>
<span id=status_msg>Waiting for connection...</span>
&nbsp;<button id=fs_btn>&#x26F6; Fullscreen</button>
<p>
<div id=canvas_wrap style="display:inline-block;">
<canvas id=canvas width=800 height=500 style="border:2px solid #fff; background:#000; cursor:none; display:block;"></canvas>
</div>
<p>
<span id=scoreboard style="font-family:monospace;font-size:20px;color:#fff;"></span>

<style>
body { background:#222; color:#fff; font-family:monospace; }
#canvas_wrap { display:block; margin:0 auto; text-align:center; }
canvas { display:block; margin:0 auto; }
#scoreboard { display:block; text-align:center; }

#canvas_wrap:fullscreen {
    display:flex; align-items:center; justify-content:center;
    width:100vw; height:100vh; background:#000;
}
#canvas_wrap:-webkit-full-screen {
    display:-webkit-flex; -webkit-align-items:center; -webkit-justify-content:center;
    width:100vw; height:100vh; background:#000;
}
#canvas_wrap:fullscreen canvas,
#canvas_wrap:-webkit-full-screen canvas {
    border:none !important;
}
</style>

<div id=logbox style="font-family:monospace;font-size:11px;color:#0f0;background:#111;padding:4px;white-space:pre-wrap;word-break:break-all;max-height:20vh;overflow:auto;margin-top:8px;"></div>

<script>
const W = 800, H = 500;
const PADDLE_W = 12, PADDLE_H = 80;
const BALL_R = 8;
const BASE_SPEED = 5;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const their_ed25519 = document.getElementById('their_ed25519');
const link = document.getElementById('link');
const serve_hint = document.getElementById('serve_hint');
const status_msg = document.getElementById('status_msg');
const scoreboard = document.getElementById('scoreboard');
const logbox = document.getElementById('logbox');
const fs_btn = document.getElementById('fs_btn');
const canvas_wrap = document.getElementById('canvas_wrap');

let my_ed25519 = null;
let socket;

function log(...args) {
    const line = document.createElement('div');
    line.textContent = `[${new Date().toLocaleTimeString()}] ${args.join(' ')}`;
    logbox.appendChild(line);
    while (logbox.children.length > 200) logbox.removeChild(logbox.firstChild);
}

window.onerror = (msg, url, line, col, err) => { log('ERROR:', msg, 'at', url+':'+line); return false; };
window.onunhandledrejection = e => log('UNHANDLED:', e.reason?.stack || e.reason || e);

function update_links() {
    if (!my_ed25519) return;
    let url = location.origin + location.pathname + '?ed25519=' + my_ed25519;
    link.href = url;
    link.textContent = url;
}
function set_their_ed25519(v) {
    their_ed25519.value = v;
    update_links();
    check_ready();
}

// ── game state ────────────────────────────────────────────────────────────────
let ballX = W/2, ballY = H/2, ballVX = 0, ballVY = 0;
let myPaddleY = H/2;
let theirPaddleY = H/2;
let myScore = 0, theirScore = 0;
let lastTheirMove = -1;
let myMoveNum = 0;
let gameActive = false;
let canServe = false;
let amLeft = false;

// ── coordinate helpers ────────────────────────────────────────────────────────
function canvasToGame(clientX, clientY) {
    const r = canvas.getBoundingClientRect();
    return {
        x: (clientX - r.left) * W / r.width,
        y: (clientY - r.top)  * H / r.height
    };
}

// ── paddle controls ───────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
    const pos = canvasToGame(e.clientX, e.clientY);
    myPaddleY = Math.max(PADDLE_H/2, Math.min(H - PADDLE_H/2, pos.y));
});

let touchStartPos = null;
let touchMoved = false;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchMoved = false;
    const t = e.touches[0];
    touchStartPos = canvasToGame(t.clientX, t.clientY);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    touchMoved = true;
    const pos = canvasToGame(e.touches[0].clientX, e.touches[0].clientY);
    myPaddleY = Math.max(PADDLE_H/2, Math.min(H - PADDLE_H/2, pos.y));
}, {passive:false});
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (!touchMoved && touchStartPos && canServe && !gameActive) {
        const dist = Math.hypot(touchStartPos.x - ballX, touchStartPos.y - ballY);
        if (dist < BALL_R * 5) doServe();
    }
    touchStartPos = null;
}, {passive:false});

// click (mouse) on ball to serve
canvas.addEventListener('click', e => {
    if (!canServe || gameActive) return;
    const pos = canvasToGame(e.clientX, e.clientY);
    const dist = Math.hypot(pos.x - ballX, pos.y - ballY);
    if (dist < BALL_R * 4) doServe();
});

function myPaddleX()    { return amLeft ? PADDLE_W              : W - PADDLE_W; }
function theirPaddleX() { return amLeft ? W - PADDLE_W          : PADDLE_W; }

// ── serve ─────────────────────────────────────────────────────────────────────
function set_can_serve(v) {
    canServe = v;
    serve_hint.style.display = v ? 'inline' : 'none';
}

function doServe() {
    if (!their_ed25519.value || !my_ed25519) return;
    const angle = (Math.random() * 60 - 30) * Math.PI / 180;
    const vx = amLeft ? Math.cos(angle) * BASE_SPEED : -Math.cos(angle) * BASE_SPEED;
    const vy = Math.sin(angle) * BASE_SPEED;
    ballX = W/2; ballY = H/2;
    ballVX = vx; ballVY = vy;
    gameActive = true;
    set_can_serve(false);
    myMoveNum++;
    send_pong_move(myMoveNum, ballX, ballY, ballVX, ballVY);
    log('served move', myMoveNum, 'vx', vx.toFixed(2), 'vy', vy.toFixed(2));
}

function send_pong_move(move_number, bx, by, vx, vy) {
    if (!their_ed25519.value || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify([{Forward:{
        to_ed25519: their_ed25519.value,
        messages: [{PongMove:{move_number, ball_x:bx, ball_y:by, vx, vy}}]
    }}]));
}

// ── receive PongMove ──────────────────────────────────────────────────────────
function handle_pong_move(msg) {
    const m = msg.PongMove;
    if (m.move_number <= lastTheirMove) {
        log('discarding stale move', m.move_number, '(last:', lastTheirMove+')');
        return;
    }
    lastTheirMove = m.move_number;
    ballX = m.ball_x; ballY = m.ball_y;
    ballVX = m.vx;    ballVY = m.vy;
    gameActive = true;
    set_can_serve(false);
    log('recv move', m.move_number, 'vx', m.vx.toFixed(2), 'vy', m.vy.toFixed(2));
}

// ── physics ───────────────────────────────────────────────────────────────────
function tick() {
    if (!gameActive) return;
    ballX += ballVX;
    ballY += ballVY;

    if (ballY - BALL_R < 0)  { ballY = BALL_R;      ballVY = Math.abs(ballVY); }
    if (ballY + BALL_R > H)  { ballY = H - BALL_R;  ballVY = -Math.abs(ballVY); }

    const mpx = myPaddleX();
    const movingTowardMe = amLeft ? ballVX < 0 : ballVX > 0;
    if (movingTowardMe) {
        const nearMyPaddle = amLeft ? ballX - BALL_R <= mpx + PADDLE_W/2
                                    : ballX + BALL_R >= mpx - PADDLE_W/2;
        if (nearMyPaddle && Math.abs(ballY - myPaddleY) < PADDLE_H/2 + BALL_R) {
            const rel = (ballY - myPaddleY) / (PADDLE_H/2);
            const speed = Math.hypot(ballVX, ballVY);
            const angle = rel * 60 * Math.PI / 180;
            ballVX = amLeft ?  Math.cos(angle) * speed : -Math.cos(angle) * speed;
            ballVY =           Math.sin(angle) * speed;
            ballX = amLeft ? mpx + PADDLE_W/2 + BALL_R + 1
                           : mpx - PADDLE_W/2 - BALL_R - 1;
            myMoveNum++;
            send_pong_move(myMoveNum, ballX, ballY, ballVX, ballVY);
            log('reflected move', myMoveNum);
        }
    }

    const pastMe = amLeft ? ballX - BALL_R < 0 : ballX + BALL_R > W;
    if (pastMe) {
        theirScore++;
        update_scoreboard();
        gameActive = false;
        ballX = W/2; ballY = H/2; ballVX = 0; ballVY = 0;
        set_can_serve(false);
        status_msg.textContent = 'You lost the point. Opponent to serve.';
        log('lost point. scores my:', myScore, 'theirs:', theirScore);
    }

    const pastThem = amLeft ? ballX + BALL_R > W : ballX - BALL_R < 0;
    if (pastThem) {
        myScore++;
        update_scoreboard();
        gameActive = false;
        ballX = W/2; ballY = H/2; ballVX = 0; ballVY = 0;
        set_can_serve(true);
        status_msg.textContent = 'You scored!';
        log('scored. scores my:', myScore, 'theirs:', theirScore);
    }
}

// ── render ────────────────────────────────────────────────────────────────────
let servePulse = 0;
function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#0af';
    ctx.fillRect(myPaddleX() - PADDLE_W/2, myPaddleY - PADDLE_H/2, PADDLE_W, PADDLE_H);

    ctx.fillStyle = '#f80';
    ctx.fillRect(theirPaddleX() - PADDLE_W/2, theirPaddleY - PADDLE_H/2, PADDLE_W, PADDLE_H);

    // ball — pulse ring when waiting to serve
    if (canServe && !gameActive) {
        servePulse = (servePulse + 0.07) % (Math.PI * 2);
        const ring = BALL_R + 6 + Math.sin(servePulse) * 4;
        ctx.strokeStyle = `rgba(0,255,0,${0.5 + 0.5 * Math.sin(servePulse)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ballX, ballY, ring, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ballX, ballY, BALL_R, 0, Math.PI*2);
    ctx.fill();
}

function update_scoreboard() {
    scoreboard.textContent = `You ${myScore}  :  ${theirScore} Them`;
}

function loop() {
    tick();
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
update_scoreboard();

// ── fullscreen ────────────────────────────────────────────────────────────────
function resizeCanvas() {
    if (document.fullscreenElement === canvas_wrap ||
        document.webkitFullscreenElement === canvas_wrap) {
        const sw = window.screen.width, sh = window.screen.height;
        const scale = Math.min(sw / W, sh / H);
        canvas.style.width  = (W * scale) + 'px';
        canvas.style.height = (H * scale) + 'px';
    } else {
        canvas.style.width  = '';
        canvas.style.height = '';
    }
}
document.addEventListener('fullscreenchange', resizeCanvas);
document.addEventListener('webkitfullscreenchange', resizeCanvas);

fs_btn.onclick = () => {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        const req = canvas_wrap.requestFullscreen || canvas_wrap.webkitRequestFullscreen;
        req.call(canvas_wrap).catch(e => log('fullscreen err', e));
    } else {
        const ex = document.exitFullscreen || document.webkitExitFullscreen;
        ex.call(document);
    }
};

// ── connectivity ──────────────────────────────────────────────────────────────
function check_ready() {
    if (my_ed25519 && their_ed25519.value) {
        amLeft = my_ed25519 < their_ed25519.value;
        const side = amLeft ? 'LEFT (blue)' : 'RIGHT (orange)';
        status_msg.textContent = `Connected. You are the ${side} paddle.`;
        if (amLeft) set_can_serve(true);
    }
}

function connect() {
    socket = new WebSocket('ws://localhost:24255/wt');
    socket.onclose = () => { log('ws closed, reconnecting'); setTimeout(connect, 200); };
    socket.onopen = () => {
        log('ws open');
        let work = Promise.resolve();
        socket.onmessage = async (event) => {
            work = work.then(async () => {
                let messages_;
                try { messages_ = JSON.parse(event.data); } catch(e) { log('parse err', e); return; }
                let messages, forwarded = false;
                if ('Forwarded' in messages_[0]) {
                    forwarded = true;
                    try { messages = JSON.parse(messages_[0].Forwarded.messages); }
                    catch(e) { log('inner parse err', e); return; }
                } else {
                    messages = messages_;
                }
                for (const msg of messages) {
                    if (!forwarded && 'YourEd25519' in msg) {
                        my_ed25519 = msg.YourEd25519.ed25519;
                        update_links();
                        check_ready();
                    }
                    if (!forwarded && 'PleaseSignYourPub' in msg) {
                        my_ed25519 = msg.PleaseSignYourPub.ed25519;
                        update_links();
                        check_ready();
                    }
                    if (forwarded && 'PongMove' in msg) {
                        handle_pong_move(msg);
                    }
                }
            });
        };

        const params = new URLSearchParams(window.location.search);
        params.forEach((v, k) => {
            if (k === 'ed25519') set_their_ed25519(v);
        });
    };
}
connect();

their_ed25519.addEventListener('input', () => {
    update_links();
    check_ready();
});
</script>
</body>
</html>
