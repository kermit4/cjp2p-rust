<html><head><title>Pong over CJP2P</title></head>
<body>
<p>Their ed25519 addr: <input id=their_ed25519 size=80>
<p>Share this link with your opponent: <a id=link href=""></a>
<p><a href=/>return to network status page</a>
<p>
<span id=status_msg>Waiting for opponent...</span>
&nbsp;<button id=fs_btn>&#x26F6; Fullscreen</button>
&nbsp;<button id=debug_btn>debug log</button>
<p>
<div id=canvas_wrap style="display:inline-block;">
<canvas id=canvas width=800 height=500 style="border:2px solid #333; background:#fff; cursor:none; display:block;"></canvas>
</div>
<p>
<span id=scoreboard style="font-family:monospace;font-size:20px;"></span>

<style>
body { background:#f5f5f5; color:#111; font-family:monospace; }
#canvas_wrap { display:block; margin:0 auto; text-align:center; }
canvas { display:block; margin:0 auto; }
#scoreboard { display:block; text-align:center; }

#canvas_wrap:fullscreen {
    display:flex; align-items:center; justify-content:center;
    width:100vw; height:100vh; background:#fff;
}
#canvas_wrap:-webkit-full-screen {
    display:-webkit-flex; -webkit-align-items:center; -webkit-justify-content:center;
    width:100vw; height:100vh; background:#fff;
}
#canvas_wrap:fullscreen canvas,
#canvas_wrap:-webkit-full-screen canvas {
    border:none !important;
}
</style>

<div id=logbox style="display:none;font-family:monospace;font-size:11px;color:#333;background:#e8e8e8;padding:4px;white-space:pre-wrap;word-break:break-all;max-height:20vh;overflow:auto;margin-top:8px;"></div>

<script>
const W = 800, H = 500;
const PADDLE_W = 12, PADDLE_H = 80;
const BALL_R = 8;
const BASE_SPEED = 5;
// You are always the left player. Opponent is always on the right.
// On network receive: mirror ballX = W - x, ballVX = -vx.

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const their_ed25519 = document.getElementById('their_ed25519');
const link = document.getElementById('link');
const status_msg = document.getElementById('status_msg');
const scoreboard = document.getElementById('scoreboard');
const logbox = document.getElementById('logbox');
const fs_btn = document.getElementById('fs_btn');
const debug_btn = document.getElementById('debug_btn');
const canvas_wrap = document.getElementById('canvas_wrap');

let my_ed25519 = null;
let socket;
let logging = false;

debug_btn.onclick = () => { logging = !logging; logbox.style.display = logging ? 'block' : 'none'; };

function log_always(...args) {
    const line = document.createElement('div');
    line.textContent = `[${new Date().toLocaleTimeString()}] ${args.join(' ')}`;
    logbox.appendChild(line);
    while (logbox.children.length > 500) logbox.removeChild(logbox.firstChild);
    if (logging) logbox.scrollTop = logbox.scrollHeight;
}
function log(...args) { if (logging) log_always(...args); }

window.onerror = (msg, url, line, col, err) => { log_always('ERROR:', msg, 'at', url+':'+line); return false; };
window.onunhandledrejection = e => log_always('UNHANDLED:', e.reason?.stack || e.reason || e);

function update_links() {
    if (!my_ed25519) return;
    let url = location.origin + location.pathname + '?ed25519=' + my_ed25519;
    link.href = url;
    link.textContent = url;
}
function set_their_ed25519(v) {
    their_ed25519.value = v;
    update_links();
    check_ready();
}

// -- audio ---------------------------------------------------------------------
let audioCtx = null;

function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function beep(freq, duration, type = 'square', gain = 0.3) {
    try {
        const ac = getAudioCtx();
        const osc = ac.createOscillator();
        const vol = ac.createGain();
        osc.connect(vol);
        vol.connect(ac.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ac.currentTime);
        vol.gain.setValueAtTime(gain, ac.currentTime);
        vol.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + duration);
    } catch(e) { /* audio not available */ }
}

function snd_paddle() { beep(480, 0.04, 'square', 0.25); }
function snd_wall()   { beep(300, 0.04, 'square', 0.18); }
function snd_score()  {
    beep(523, 0.12, 'sine', 0.35);
    setTimeout(() => beep(784, 0.18, 'sine', 0.35), 120);
}
function snd_lose()   {
    beep(330, 0.12, 'sine', 0.3);
    setTimeout(() => beep(220, 0.2, 'sine', 0.3), 120);
}

// -- game state ----------------------------------------------------------------
let ballX = W/2, ballY = H/2, ballVX = 0, ballVY = 0;
let myPaddleY = H/2;
let theirPaddleY = H/2;
let myScore = 0, theirScore = 0;
let lastTheirMove = -1;
let myMoveNum = Date.now(); // start high so post-reload moves aren't rejected as stale
let gameActive = false;

// -- paddle controls -----------------------------------------------------------
let lastPaddleSend = 0;
function movePaddle(y) {
    myPaddleY = Math.max(PADDLE_H/2, Math.min(H - PADDLE_H/2, y));
    const now = Date.now();
    if (now - lastPaddleSend >= 8) {
        lastPaddleSend = now;
        send_pong_paddle(myPaddleY);
    }
}

function canvasToGame(clientX, clientY) {
    const r = canvas.getBoundingClientRect();
    return {
        x: (clientX - r.left) * W / r.width,
        y: (clientY - r.top)  * H / r.height
    };
}

canvas.addEventListener('mousemove', e => {
    movePaddle(canvasToGame(e.clientX, e.clientY).y);
});

let touchStartPos = null;
let touchStartTime = 0;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStartPos = canvasToGame(t.clientX, t.clientY);
    touchStartTime = Date.now();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    movePaddle(canvasToGame(e.touches[0].clientX, e.touches[0].clientY).y);
}, {passive:false});
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (!gameActive) {
        const duration = Date.now() - touchStartTime;
        const t = e.changedTouches[0];
        const end = canvasToGame(t.clientX, t.clientY);
        const dist = touchStartPos ? Math.hypot(end.x - touchStartPos.x, end.y - touchStartPos.y) : 999;
        if (duration < 300 && dist < 20) doServe();
    }
    touchStartPos = null;
}, {passive:false});

canvas.addEventListener('click', e => {
    if (gameActive) return;
    doServe();
});

// -- serve ---------------------------------------------------------------------
function doServe() {
    if (!their_ed25519.value || !my_ed25519) return;
    const angle = (Math.random() * 60 - 30) * Math.PI / 180;
    // serve toward self (left), ball starts just outside my paddle's hit zone
    ballVX = -Math.cos(angle) * BASE_SPEED;
    ballVY =  Math.sin(angle) * BASE_SPEED;
    ballX = PADDLE_W * 2 + BALL_R + 2;
    ballY = myPaddleY;
    gameActive = true;
    myMoveNum++;
    send_pong_move(myMoveNum, ballX, ballY, ballVX, ballVY);
    log_always('sent serve', myMoveNum, 'x', ballX.toFixed(0), 'y', ballY.toFixed(0), 'vx', ballVX.toFixed(2), 'vy', ballVY.toFixed(2));
}

function send_pong_move(move_number, bx, by, vx, vy) {
    if (!their_ed25519.value || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify([{Forward:{
        to_ed25519: their_ed25519.value,
        messages: [{PongMove:{move_number, ball_x:bx, ball_y:by, vx, vy}}]
    }}]));
}

function send_pong_paddle(y) {
    if (!their_ed25519.value || !socket || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify([{Forward:{
        to_ed25519: their_ed25519.value,
        messages: [{PongPaddle:{paddle_y: y}}]
    }}]));
}

// -- receive PongMove ----------------------------------------------------------
// Mirror x on receipt: their left is our right.
function handle_pong_move(msg) {
    const m = msg.PongMove;
    if (m.move_number <= lastTheirMove) {
        log_always('discarding stale move', m.move_number, '(last:', lastTheirMove+')');
        return;
    }
    lastTheirMove = m.move_number;
    ballX  =  W - m.ball_x;
    ballY  =  m.ball_y;
    ballVX = -m.vx;
    ballVY =  m.vy;
    gameActive = true;
    log_always('recv move', m.move_number, 'x', ballX.toFixed(0), 'y', ballY.toFixed(0), 'vx', ballVX.toFixed(2), 'vy', ballVY.toFixed(2));
}

// -- physics -------------------------------------------------------------------
function tick(dt) {
    if (!gameActive) return;
    const s = dt / 16.667;
    ballX += ballVX * s;
    ballY += ballVY * s;

    if (ballY - BALL_R < 0) { ballY = BALL_R;      ballVY =  Math.abs(ballVY); snd_wall(); }
    if (ballY + BALL_R > H) { ballY = H - BALL_R;  ballVY = -Math.abs(ballVY); snd_wall(); }

    // ball approaching my paddle (left side)
    if (ballVX < 0 && ballX - BALL_R <= PADDLE_W + PADDLE_W/2) {
        if (Math.abs(ballY - myPaddleY) < PADDLE_H/2 + BALL_R) {
            const rel = (ballY - myPaddleY) / (PADDLE_H/2);
            const speed = Math.hypot(ballVX, ballVY);
            const angle = rel * 60 * Math.PI / 180;
            ballVX =  Math.cos(angle) * speed;  // positive = toward opponent (right)
            ballVY =  Math.sin(angle) * speed;
            ballX  =  PADDLE_W + PADDLE_W/2 + BALL_R + 1;
            myMoveNum++;
            send_pong_move(myMoveNum, ballX, ballY, ballVX, ballVY);
            snd_paddle();
            log_always('sent reflect', myMoveNum, 'x', ballX.toFixed(0), 'y', ballY.toFixed(0), 'vx', ballVX.toFixed(2), 'vy', ballVY.toFixed(2));
        }
    }

    if (ballX - BALL_R < 0) {
        theirScore++;
        update_scoreboard();
        gameActive = false;
        ballX = W/2; ballY = H/2; ballVX = 0; ballVY = 0;
        snd_lose();
        status_msg.textContent = 'You lost the point. Opponent to serve.';
        log_always('lost point. score', myScore, ':', theirScore);
    }

    if (ballX + BALL_R > W) {
        myScore++;
        update_scoreboard();
        gameActive = false;
        ballX = W/2; ballY = H/2; ballVX = 0; ballVY = 0;
        snd_score();
        status_msg.textContent = 'You scored!';
        log_always('scored. score', myScore, ':', theirScore);
    }
}

// -- render --------------------------------------------------------------------
let servePulse = 0;
function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);

    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#111';
    ctx.fillRect(PADDLE_W - PADDLE_W/2, myPaddleY - PADDLE_H/2, PADDLE_W, PADDLE_H);

    ctx.fillStyle = '#666';
    ctx.fillRect(W - PADDLE_W - PADDLE_W/2, theirPaddleY - PADDLE_H/2, PADDLE_W, PADDLE_H);

    if (!gameActive) {
        servePulse = (servePulse + 0.07) % (Math.PI * 2);
        const ring = BALL_R + 6 + Math.sin(servePulse) * 4;
        ctx.strokeStyle = `rgba(0,0,0,${0.5 + 0.5 * Math.sin(servePulse)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ballX, ballY, ring, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(ballX, ballY, BALL_R, 0, Math.PI*2);
    ctx.fill();
}

function update_scoreboard() {
    scoreboard.textContent = `You ${myScore}  :  ${theirScore} Opponent`;
}

let lastFrameTime = null;
function loop(ts) {
    const dt = lastFrameTime === null ? 16.667 : Math.min(ts - lastFrameTime, 50);
    lastFrameTime = ts;
    tick(dt);
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
update_scoreboard();

// -- fullscreen ----------------------------------------------------------------
function resizeCanvas() {
    if (document.fullscreenElement === canvas_wrap ||
        document.webkitFullscreenElement === canvas_wrap) {
        const sw = window.screen.width, sh = window.screen.height;
        const scale = Math.min(sw / W, sh / H);
        canvas.style.width  = (W * scale) + 'px';
        canvas.style.height = (H * scale) + 'px';
    } else {
        canvas.style.width  = '';
        canvas.style.height = '';
    }
}
document.addEventListener('fullscreenchange', resizeCanvas);
document.addEventListener('webkitfullscreenchange', resizeCanvas);

fs_btn.onclick = () => {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        const req = canvas_wrap.requestFullscreen || canvas_wrap.webkitRequestFullscreen;
        req.call(canvas_wrap).catch(e => log_always('fullscreen err', e));
    } else {
        const ex = document.exitFullscreen || document.webkitExitFullscreen;
        ex.call(document);
    }
};

function check_ready() {
    if (my_ed25519 && their_ed25519.value) {
        status_msg.textContent = 'Click or tap anywhere to serve -- first one goes first!';
    }
}

function connect() {
    socket = new WebSocket('ws://localhost:24255/wt');
    socket.onclose = () => { log_always('ws closed, reconnecting'); setTimeout(connect, 200); };
    socket.onopen = () => {
        log('ws open');
        let work = Promise.resolve();
        socket.onmessage = async (event) => {
            work = work.then(async () => {
                let messages_;
                try { messages_ = JSON.parse(event.data); } catch(e) { log_always('parse err', e); return; }
                let messages, forwarded = false;
                if ('Forwarded' in messages_[0]) {
                    forwarded = true;
                    try { messages = JSON.parse(messages_[0].Forwarded.messages); }
                    catch(e) { log_always('inner parse err', e); return; }
                } else {
                    messages = messages_;
                }
                for (const msg of messages) {
                    if (!forwarded && 'YourEd25519' in msg) {
                        my_ed25519 = msg.YourEd25519.ed25519;
                        update_links();
                        check_ready();
                    }
                    if (!forwarded && 'PleaseSignYourPub' in msg) {
                        my_ed25519 = msg.PleaseSignYourPub.ed25519;
                        update_links();
                        check_ready();
                    }
                    if (forwarded && 'PongMove' in msg) {
                        handle_pong_move(msg);
                    }
                    if (forwarded && 'PongPaddle' in msg) {
                        theirPaddleY = msg.PongPaddle.paddle_y;
                    }
                }
            });
        };

        const params = new URLSearchParams(window.location.search);
        params.forEach((v, k) => {
            if (k === 'ed25519') set_their_ed25519(v);
        });
    };
}
connect();

their_ed25519.addEventListener('input', () => {
    update_links();
    check_ready();
});
</script>
</body>
</html>
