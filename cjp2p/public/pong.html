<html><head><title>Pong over CJP2P</title></head>
<body>
<p>Their ed25519 addr: <input id=their_ed25519 size=80>
<p>Share this link with your opponent: <a id=link href=""></a>
<p><a href=/>return to network status page</a>
<p>
<span id=serve_hint style="display:none;font-family:monospace;font-size:14px;">&#x25ba; Click/tap anywhere to serve</span>
<span id=status_msg>Waiting for opponent...</span>
&nbsp;<button id=fs_btn>&#x26F6; Fullscreen</button>
<p>
<div id=canvas_wrap style="display:inline-block;">
<canvas id=canvas width=800 height=500 style="border:2px solid #333; background:#fff; cursor:none; display:block;"></canvas>
</div>
<p>
<span id=scoreboard style="font-family:monospace;font-size:20px;"></span>

<style>
body { background:#f5f5f5; color:#111; font-family:monospace; }
#canvas_wrap { display:block; margin:0 auto; text-align:center; }
canvas { display:block; margin:0 auto; }
#scoreboard { display:block; text-align:center; }

#canvas_wrap:fullscreen {
    display:flex; align-items:center; justify-content:center;
    width:100vw; height:100vh; background:#fff;
}
#canvas_wrap:-webkit-full-screen {
    display:-webkit-flex; -webkit-align-items:center; -webkit-justify-content:center;
    width:100vw; height:100vh; background:#fff;
}
#canvas_wrap:fullscreen canvas,
#canvas_wrap:-webkit-full-screen canvas {
    border:none !important;
}
</style>

<div id=logbox style="font-family:monospace;font-size:11px;color:#333;background:#e8e8e8;padding:4px;white-space:pre-wrap;word-break:break-all;max-height:20vh;overflow:auto;margin-top:8px;"></div>

<script>
const W = 800, H = 500;
const PADDLE_W = 12, PADDLE_H = 80;
const BALL_R = 8;
const BASE_SPEED = 5;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const their_ed25519 = document.getElementById('their_ed25519');
const link = document.getElementById('link');
const serve_hint = document.getElementById('serve_hint');
const status_msg = document.getElementById('status_msg');
const scoreboard = document.getElementById('scoreboard');
const logbox = document.getElementById('logbox');
const fs_btn = document.getElementById('fs_btn');
const canvas_wrap = document.getElementById('canvas_wrap');

let my_ed25519 = null;
let socket;

function log(...args) {
    const line = document.createElement('div');
    line.textContent = `[${new Date().toLocaleTimeString()}] ${args.join(' ')}`;
    logbox.appendChild(line);
    while (logbox.children.length > 200) logbox.removeChild(logbox.firstChild);
}

window.onerror = (msg, url, line, col, err) => { log('ERROR:', msg, 'at', url+':'+line); return false; };
window.onunhandledrejection = e => log('UNHANDLED:', e.reason?.stack || e.reason || e);

function update_links() {
    if (!my_ed25519) return;
    let url = location.origin + location.pathname + '?ed25519=' + my_ed25519;
    link.href = url;
    link.textContent = url;
}
function set_their_ed25519(v) {
    their_ed25519.value = v;
    update_links();
    check_ready();
}

// -- audio ---------------------------------------------------------------------
let audioCtx = null;

function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function beep(freq, duration, type = 'square', gain = 0.3) {
    try {
        const ac = getAudioCtx();
        const osc = ac.createOscillator();
        const vol = ac.createGain();
        osc.connect(vol);
        vol.connect(ac.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ac.currentTime);
        vol.gain.setValueAtTime(gain, ac.currentTime);
        vol.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + duration);
    } catch(e) { /* audio not available */ }
}

function snd_paddle() { beep(480, 0.04, 'square', 0.25); }
function snd_wall()   { beep(300, 0.04, 'square', 0.18); }
function snd_score()  {
    // rising two-tone fanfare
    beep(523, 0.12, 'sine', 0.35);
    setTimeout(() => beep(784, 0.18, 'sine', 0.35), 120);
}
function snd_lose()   {
    // falling two-tone
    beep(330, 0.12, 'sine', 0.3);
    setTimeout(() => beep(220, 0.2, 'sine', 0.3), 120);
}

// -- game state ----------------------------------------------------------------
let ballX = W/2, ballY = H/2, ballVX = 0, ballVY = 0;
let myPaddleY = H/2;
let theirPaddleY = H/2;
let myScore = 0, theirScore = 0;
let lastTheirMove = -1;
let myMoveNum = 0;
let gameActive = false;
let canServe = false;
let amLeft = false;

// -- coordinate helpers --------------------------------------------------------
// Each player always sees themselves on the left. For the "right" player
// in game coordinates, we mirror X for display and for input hit-testing.
function displayX(gameX) { return amLeft ? gameX : W - gameX; }

function canvasToGame(clientX, clientY) {
    const r = canvas.getBoundingClientRect();
    return {
        x: (clientX - r.left) * W / r.width,
        y: (clientY - r.top)  * H / r.height
    };
}

// -- paddle controls -----------------------------------------------------------
let lastPaddleSend = 0;
function movePaddle(y) {
    myPaddleY = Math.max(PADDLE_H/2, Math.min(H - PADDLE_H/2, y));
    const now = Date.now();
    if (now - lastPaddleSend > 33) { // ~30fps
        lastPaddleSend = now;
        send_pong_paddle(myPaddleY);
    }
}

canvas.addEventListener('mousemove', e => {
    const pos = canvasToGame(e.clientX, e.clientY);
    movePaddle(pos.y);
});

let touchStartPos = null;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStartPos = canvasToGame(t.clientX, t.clientY);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const pos = canvasToGame(e.touches[0].clientX, e.touches[0].clientY);
    movePaddle(pos.y);
}, {passive:false});
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (!gameActive) doServe();
    touchStartPos = null;
}, {passive:false});

canvas.addEventListener('click', e => {
    if (gameActive) return;
    doServe();
});

function myPaddleX()    { return amLeft ? PADDLE_W     : W - PADDLE_W; }
function theirPaddleX() { return amLeft ? W - PADDLE_W : PADDLE_W; }

// -- serve ---------------------------------------------------------------------
function set_can_serve(v) {
    canServe = v;
    serve_hint.style.display = v ? 'inline' : 'none';
}

function doServe() {
    if (!their_ed25519.value || !my_ed25519) return;
    const angle = (Math.random() * 60 - 30) * Math.PI / 180;
    const vx = amLeft ? -Math.cos(angle) * BASE_SPEED : Math.cos(angle) * BASE_SPEED;
    const vy = Math.sin(angle) * BASE_SPEED;
    ballX = W/2; ballY = H/2;
    ballVX = vx; ballVY = vy;
    gameActive = true;
    set_can_serve(false);
    myMoveNum++;
    send_pong_move(myMoveNum, ballX, ballY, ballVX, ballVY);
    log('served move', myMoveNum, 'vx', vx.toFixed(2), 'vy', vy.toFixed(2));
}

function send_pong_move(move_number, bx, by, vx, vy) {
    if (!their_ed25519.value || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify([{Forward:{
        to_ed25519: their_ed25519.value,
        messages: [{PongMove:{move_number, ball_x:bx, ball_y:by, vx, vy}}]
    }}]));
}

function send_pong_paddle(y) {
    if (!their_ed25519.value || !socket || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify([{Forward:{
        to_ed25519: their_ed25519.value,
        messages: [{PongPaddle:{paddle_y: y}}]
    }}]));
}

// -- receive PongMove ----------------------------------------------------------
function handle_pong_move(msg) {
    const m = msg.PongMove;
    if (m.move_number <= lastTheirMove) {
        log('discarding stale move', m.move_number, '(last:', lastTheirMove+')');
        return;
    }
    // If we just scored (canServe=true) and the game is inactive, this move is
    // from the rally that just ended -- ignore it so it can't claw back our point.
    if (!gameActive && canServe) {
        log('ignoring post-score stale move', m.move_number);
        return;
    }
    lastTheirMove = m.move_number;
    ballX = m.ball_x; ballY = m.ball_y;
    ballVX = m.vx;    ballVY = m.vy;
    gameActive = true;
    set_can_serve(false);
    log('recv move', m.move_number, 'vx', m.vx.toFixed(2), 'vy', m.vy.toFixed(2));
}

// -- physics -------------------------------------------------------------------
let prevBallY = H/2;

function tick() {
    if (!gameActive) return;
    prevBallY = ballY;
    ballX += ballVX;
    ballY += ballVY;

    if (ballY - BALL_R < 0)  { ballY = BALL_R;      ballVY = Math.abs(ballVY);  snd_wall(); }
    if (ballY + BALL_R > H)  { ballY = H - BALL_R;  ballVY = -Math.abs(ballVY); snd_wall(); }

    const mpx = myPaddleX();
    const movingTowardMe = amLeft ? ballVX < 0 : ballVX > 0;
    if (movingTowardMe) {
        const nearMyPaddle = amLeft ? ballX - BALL_R <= mpx + PADDLE_W/2
                                    : ballX + BALL_R >= mpx - PADDLE_W/2;
        if (nearMyPaddle && Math.abs(ballY - myPaddleY) < PADDLE_H/2 + BALL_R) {
            const rel = (ballY - myPaddleY) / (PADDLE_H/2);
            const speed = Math.hypot(ballVX, ballVY);
            const angle = rel * 60 * Math.PI / 180;
            ballVX = amLeft ?  Math.cos(angle) * speed : -Math.cos(angle) * speed;
            ballVY =           Math.sin(angle) * speed;
            ballX = amLeft ? mpx + PADDLE_W/2 + BALL_R + 1
                           : mpx - PADDLE_W/2 - BALL_R - 1;
            myMoveNum++;
            send_pong_move(myMoveNum, ballX, ballY, ballVX, ballVY);
            snd_paddle();
            log('reflected move', myMoveNum);
        }
    }

    const pastMe = amLeft ? ballX - BALL_R < 0 : ballX + BALL_R > W;
    if (pastMe) {
        theirScore++;
        update_scoreboard();
        gameActive = false;
        ballX = W/2; ballY = H/2; ballVX = 0; ballVY = 0;
        set_can_serve(false);
        snd_lose();
        status_msg.textContent = 'You lost the point. Opponent to serve.';
        log('lost point. scores my:', myScore, 'theirs:', theirScore);
    }

    const pastThem = amLeft ? ballX + BALL_R > W : ballX - BALL_R < 0;
    if (pastThem) {
        myScore++;
        update_scoreboard();
        gameActive = false;
        ballX = W/2; ballY = H/2; ballVX = 0; ballVY = 0;
        set_can_serve(true);
        snd_score();
        status_msg.textContent = 'You scored!';
        log('scored. scores my:', myScore, 'theirs:', theirScore);
    }
}

// -- render --------------------------------------------------------------------
let servePulse = 0;
function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);

    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
    ctx.setLineDash([]);

    // My paddle always appears on the left; theirs on the right.
    ctx.fillStyle = '#111';
    ctx.fillRect(displayX(myPaddleX()) - PADDLE_W/2, myPaddleY - PADDLE_H/2, PADDLE_W, PADDLE_H);

    ctx.fillStyle = '#666';
    ctx.fillRect(displayX(theirPaddleX()) - PADDLE_W/2, theirPaddleY - PADDLE_H/2, PADDLE_W, PADDLE_H);

    // ball -- pulse ring when waiting to serve
    const dbx = displayX(ballX);
    if (canServe && !gameActive) {
        servePulse = (servePulse + 0.07) % (Math.PI * 2);
        const ring = BALL_R + 6 + Math.sin(servePulse) * 4;
        ctx.strokeStyle = `rgba(0,0,0,${0.5 + 0.5 * Math.sin(servePulse)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(dbx, ballY, ring, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(dbx, ballY, BALL_R, 0, Math.PI*2);
    ctx.fill();
}

function update_scoreboard() {
    scoreboard.textContent = `You ${myScore}  :  ${theirScore} Opponent`;
}

function loop() {
    tick();
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
update_scoreboard();

// -- fullscreen ----------------------------------------------------------------
function resizeCanvas() {
    if (document.fullscreenElement === canvas_wrap ||
        document.webkitFullscreenElement === canvas_wrap) {
        const sw = window.screen.width, sh = window.screen.height;
        const scale = Math.min(sw / W, sh / H);
        canvas.style.width  = (W * scale) + 'px';
        canvas.style.height = (H * scale) + 'px';
    } else {
        canvas.style.width  = '';
        canvas.style.height = '';
    }
}
document.addEventListener('fullscreenchange', resizeCanvas);
document.addEventListener('webkitfullscreenchange', resizeCanvas);

fs_btn.onclick = () => {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        const req = canvas_wrap.requestFullscreen || canvas_wrap.webkitRequestFullscreen;
        req.call(canvas_wrap).catch(e => log('fullscreen err', e));
    } else {
        const ex = document.exitFullscreen || document.webkitExitFullscreen;
        ex.call(document);
    }
};

function check_ready() {
    if (my_ed25519 && their_ed25519.value) {
        amLeft = my_ed25519 < their_ed25519.value;
        status_msg.textContent = 'Click or tap anywhere to serve -- first one goes first!';
        set_can_serve(true);
    }
}

function connect() {
    socket = new WebSocket('ws://localhost:24255/wt');
    socket.onclose = () => { log('ws closed, reconnecting'); setTimeout(connect, 200); };
    socket.onopen = () => {
        log('ws open');
        let work = Promise.resolve();
        socket.onmessage = async (event) => {
            work = work.then(async () => {
                let messages_;
                try { messages_ = JSON.parse(event.data); } catch(e) { log('parse err', e); return; }
                let messages, forwarded = false;
                if ('Forwarded' in messages_[0]) {
                    forwarded = true;
                    try { messages = JSON.parse(messages_[0].Forwarded.messages); }
                    catch(e) { log('inner parse err', e); return; }
                } else {
                    messages = messages_;
                }
                for (const msg of messages) {
                    if (!forwarded && 'YourEd25519' in msg) {
                        my_ed25519 = msg.YourEd25519.ed25519;
                        update_links();
                        check_ready();
                    }
                    if (!forwarded && 'PleaseSignYourPub' in msg) {
                        my_ed25519 = msg.PleaseSignYourPub.ed25519;
                        update_links();
                        check_ready();
                    }
                    if (forwarded && 'PongMove' in msg) {
                        handle_pong_move(msg);
                    }
                    if (forwarded && 'PongPaddle' in msg) {
                        theirPaddleY = msg.PongPaddle.paddle_y;
                    }
                }
            });
        };

        const params = new URLSearchParams(window.location.search);
        params.forEach((v, k) => {
            if (k === 'ed25519') set_their_ed25519(v);
        });
    };
}
connect();

their_ed25519.addEventListener('input', () => {
    update_links();
    check_ready();
});
</script>
</body>
</html>
