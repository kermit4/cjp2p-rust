<!DOCTYPE html>
<html><head><title>CJP2P video chat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
#videos { display:flex; gap:8px; flex-wrap:wrap; }
@media(orientation:portrait) { #videos { flex-direction:column; } }
video, canvas { display:block; background:#000; }
.vid-wrap { display:inline-block; position:relative; vertical-align:top; }
.vid-label { font-size:11px; color:#888; }
.fs-btn { position:absolute; top:18px; right:2px; opacity:0.75;
          padding:1px 5px; font-size:15px; line-height:1; cursor:pointer; }
.fs-btn:hover { opacity:1; }
#controls { display:flex; align-items:center; gap:8px; margin:6px 0; }
.led { width:12px; height:12px; border-radius:50%; border:1px solid #888;
       background:#600; display:inline-block; flex-shrink:0; }
.led.on { background:#e00; box-shadow:0 0 5px #e00; }
.rx-led { background:#040; }
.rx-led.on { background:#0d0; box-shadow:0 0 5px #0d0; }
#vuMeter { display:inline-flex; gap:2px; align-items:center; width:90px; flex-shrink:0; }
.vu-seg { width:5px; height:14px; background:#ddd; border-radius:1px; flex-shrink:0; }
#logDiv { font-family:monospace; font-size:11px; white-space:pre-wrap;
          word-break:break-all; max-height:30vh; overflow:auto; border:1px solid #ccc; padding:4px; }
.tip-wrap { position:relative; cursor:help; border-bottom:1px dotted #888; display:inline; }
.tip { display:none; position:absolute; z-index:20; background:#222; color:#eee;
       font-family:sans-serif; font-size:11px; font-weight:normal; line-height:1.5;
       padding:6px 9px; border-radius:5px; width:230px; bottom:calc(100% + 4px); left:0;
       white-space:normal; box-shadow:0 2px 8px rgba(0,0,0,.5); pointer-events:none; }
.tip-wrap:hover .tip, .tip-wrap.tip-open .tip { display:block; }
</style>
</head>
<body>
their ed25519: <input id=their_ed25519 size=80>
<br>share: <a id=link href=""></a>
<br>ws url: <input id=ws_url size=50>
<br><a href=/>status page</a>
<p>
<div id=videos>
  <div class=vid-wrap>
    <div class=vid-label>Local</div>
    <video id=localVideo autoplay muted playsinline></video>
    <button class=fs-btn id=fsLocal>&#x26F6;</button>
  </div>
  <div class=vid-wrap>
    <div class=vid-label>Remote</div>
    <canvas id=remoteCanvas width=320 height=240></canvas>
    <button class=fs-btn id=fsRemote>&#x26F6;</button>
  </div>
</div>
<div id=controls>
  <span class=led id=recLed title="mic recording"></span>
  <div id=vuMeter></div>
  <button id=muteAudioBtn>Unmute Mic</button>
  <button id=muteVideoBtn>Unmute Video</button>
  <span class="led rx-led" id=rxLed title="rx audio"></span>
  <button id=echoCancelBtn>Echo: On</button>
  <button id=noiseBtn>Noise: Off</button>
  <button id=gainBtn>Gain: Off</button>
  <button id=debugBtn>debug log</button>
</div>
<pre id=stats style="font-size:11px;margin:4px 0;"></pre>
<div id=logDiv></div>

<script>
const their_ed25519 = document.getElementById('their_ed25519');
const link          = document.getElementById('link');
const localVideo    = document.getElementById('localVideo');
const remoteCanvas  = document.getElementById('remoteCanvas');
const recLed        = document.getElementById('recLed');
const rxLed         = document.getElementById('rxLed');
const muteAudioBtn  = document.getElementById('muteAudioBtn');
const muteVideoBtn  = document.getElementById('muteVideoBtn');
const debugBtn      = document.getElementById('debugBtn');
const logDiv        = document.getElementById('logDiv');
const ws_url_input  = document.getElementById('ws_url');
ws_url_input.value  = 'ws://localhost:24255/wt';
ws_url_input.onchange = () => { if (socket) socket.close(); };

// -- VU meter (12 fixed-width segments, never reflows) ------------------------
const VU_N = 12;
const vuSegs = Array.from({length: VU_N}, () => {
    const s = document.createElement('div');
    s.className = 'vu-seg';
    document.getElementById('vuMeter').appendChild(s);
    return s;
});
function setVU(v) {
    const lit = Math.round(v * VU_N);
    vuSegs.forEach((s, i) => {
        s.style.background = i >= lit ? '#ddd'
            : i < VU_N * 0.6 ? '#0a0'
            : i < VU_N * 0.85 ? '#aa0' : '#d00';
    });
}
setVU(0);

// -- LEDs ---------------------------------------------------------------------
function setLed(el, on) { el.classList.toggle('on', on); }

// -- logging ------------------------------------------------------------------
let logging = false;
debugBtn.onclick = () => { logging = !logging; };
function log_always(...a) {
    const d = document.createElement('div');
    d.textContent = `[${new Date().toLocaleTimeString()}] ${a.join(' ')}`;
    logDiv.appendChild(d);
    while (logDiv.children.length > 500) logDiv.removeChild(logDiv.firstChild);
    if (logging) logDiv.scrollTop = logDiv.scrollHeight;
}
function log(...a) { if (logging) log_always(...a); }
window.onerror = (m, u, l, c, e) => { log_always('ERROR:', m, '@', l+':'+c); if (e?.stack) log_always(e.stack); return false; };
window.onunhandledrejection = e => log_always('UNHANDLED:', e.reason?.stack || e.reason || e);

// -- base64 -------------------------------------------------------------------
function u8toB64(u8) {
    let s = ''; const C = 0x8000;
    for (let i = 0; i < u8.length; i += C) s += String.fromCharCode.apply(null, u8.subarray(i, i+C));
    return btoa(s);
}
function b64ToU8(b64) {
    const s = atob(b64), u8 = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++) u8[i] = s.charCodeAt(i);
    return u8;
}

// -- identity -----------------------------------------------------------------
let my_ed25519 = null;
function update_links() {
    if (!my_ed25519) return;
    const url = location.origin + location.pathname + '?ed25519=' + my_ed25519;
    link.href = url; link.textContent = url;
}
their_ed25519.addEventListener('input', update_links);

// -- fullscreen ---------------------------------------------------------------
function goFullscreen(el) {
    (el.requestFullscreen || el.webkitRequestFullscreen || (() => {})).call(el);
}
document.getElementById('fsLocal').onclick  = () => goFullscreen(localVideo);
document.getElementById('fsRemote').onclick = () => goFullscreen(remoteCanvas);

// -- fit element to wxh, longest side = 320px --------------------------------
const MAX_DIM = 320;
function fitEl(el, w, h) {
    const scale = Math.min(MAX_DIM / w, MAX_DIM / h, 1);
    el.style.width  = Math.round(w * scale) + 'px';
    el.style.height = Math.round(h * scale) + 'px';
}
// local video: let camera aspect ratio come through naturally
fitEl(localVideo, 320, 240); // placeholder until camera starts

// -- state --------------------------------------------------------------------
let camStream    = null;
let encoder      = null;
let decoder      = null;
let frameReader  = null;
let needKeyframe = true;
let frameCount   = 0;
let videoMuted   = true;
let micActive    = false;
let videoSeqSent = Date.now(); // start high so post-reload seqs aren't rejected as stale
let videoSeqRecv = 0;

// -- audio state --------------------------------------------------------------
let echoCancel    = true;
let noiseSuppress = false;
let autoGain      = false;
let micSrc          = null;
let audioCtx        = null;
let recordProc      = null;
let playProc        = null;
let audioEncoder    = null;
let audioDecoder    = null;
let audioTsCounter  = 0;  // monotonic counter for WebCodecs internal use; never on wire
let offset_sent     = Date.now(); // start high so post-reload seqs aren't rejected as stale
let offset_received = 0;
let lastSample      = 0;

let videoDrops = 0, lastVideoDropMs = null, hasFirstVideo = false;
let audioDrops = 0, lastAudioDropMs = null, hasFirstAudio = false;
let videoDelayMs = 0;
const videoQueue = [];
const videoPending = new Map(); // seq -> {vf, arrivedAt} — pre-decode reorder buffer
const audioPending = new Map(); // offset -> {af, arrivedAt} — pre-decode reorder buffer
let sendW = 0, sendH = 0;
let lastVideoFrame = null;

// latency chart
const CHART_W = 320;
const CHART_MS_PER_COL = 200;
const CHART_MAX_RTT = 500;
const audioChartData = new Array(CHART_W).fill(null);
const videoChartData = new Array(CHART_W).fill(null);
let latChartCursor = Math.floor(Date.now() / CHART_MS_PER_COL) % CHART_W;
let audioPingSeq = 0, videoPingSeq = 0;
const pendingAudioPings = new Map();
const pendingVideoPings = new Map();
let audioFramesSent = 0, videoFramesSent = 0;
let lastAudioRtt = null, lastRemoteBuf = null;

const BPS_WINDOW_MS = 5000;
const keyframeBits   = []; // {t, bytes} — raw VP8 bytes, keyframes
const deltaframeBits = []; // {t, bytes} — raw VP8 bytes, delta frames

const RING_SIZE  = 32768;             // ~682ms capacity at 48kHz
const AUDIO_RATE = 48000;
const SP_FRAMES  = 512;              // ~10.7ms per ScriptProcessor callback
const MIN_BUF    = SP_FRAMES;        // ~10.7ms minimum target
const MAX_BUF    = 24000;            // ~500ms maximum target (handles 400ms+ spikes)
let   audioBufTarget = MIN_BUF;      // adaptive; drives videoDelayMs
const ring = new Float32Array(RING_SIZE);
let writeIdx = 0, readIdx = 0;
let inUnderrun = false;

// -- audio receive decoder (no user gesture needed) ---------------------------
if ('AudioDecoder' in window) {
    audioDecoder = new AudioDecoder({
        output: audioData => {
            const pcm = new Float32Array(audioData.numberOfFrames);
            audioData.copyTo(pcm, { planeIndex: 0, format: 'f32-planar' });
            audioData.close();
            setLed(rxLed, true);
            // if ring was empty (resuming from underrun), ramp up to avoid pop
            const resuming = (writeIdx === readIdx);
            const rampLen = resuming ? Math.min(SP_FRAMES, pcm.length) : 0;
            for (let i = 0; i < pcm.length; i++) {
                ring[writeIdx] = i < rampLen ? pcm[i] * (i / rampLen) : pcm[i];
                writeIdx = (writeIdx + 1) & (RING_SIZE - 1);
                if (writeIdx === readIdx) readIdx = (readIdx + SP_FRAMES) & (RING_SIZE - 1); // ring full safety
            }
            // trim excess: if buffer depth exceeds target + 2 callbacks, skip to target
            const depth = (writeIdx - readIdx + RING_SIZE) & (RING_SIZE - 1);
            if (depth > audioBufTarget + SP_FRAMES * 2) {
                readIdx = (writeIdx - audioBufTarget) & (RING_SIZE - 1);
            }
        },
        error: e => log_always('audio decoder err:', e.message || e)
    });
    try { audioDecoder.configure({ codec:'opus', sampleRate:48000, numberOfChannels:1 }); }
    catch(e) { log_always('AudioDecoder configure failed:', e.message); audioDecoder = null; }
}

// -- video decoder ------------------------------------------------------------
function makeDecoder(w, h) {
    const d = new VideoDecoder({
        output: frame => {
            if (remoteCanvas.width !== frame.displayWidth || remoteCanvas.height !== frame.displayHeight) {
                remoteCanvas.width  = frame.displayWidth;
                remoteCanvas.height = frame.displayHeight;
                fitEl(remoteCanvas, frame.displayWidth, frame.displayHeight);
            }
            createImageBitmap(frame).then(bm => {
                videoQueue.push({ bm, due: Date.now() + videoDelayMs });
            });
            frame.close();
            needKeyframe = false;
        },
        error: e => { log_always('video decoder err:', e.message || e); needKeyframe = true; }
    });
    const cfg = { codec: 'vp8' };
    if (w && h) { cfg.codedWidth = w; cfg.codedHeight = h; }
    d.configure(cfg);
    return d;
}

// -- audio context + playback (requires user gesture) -------------------------
async function ensureAudioCtx() {
    if (audioCtx) { await audioCtx.resume(); return; }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    await audioCtx.resume();
    const hwLatency = (audioCtx.outputLatency || 0) + (audioCtx.baseLatency || 0);
    log_always('audio hw latency reported:', Math.round(hwLatency*1000)+'ms  adaptive buffer: '+Math.round(MIN_BUF/AUDIO_RATE*1000)+'ms–'+Math.round(MAX_BUF/AUDIO_RATE*1000)+'ms');
    playProc = audioCtx.createScriptProcessor(SP_FRAMES, 1, 1);
    playProc.onaudioprocess = e => {
        const out = e.outputBuffer.getChannelData(0);
        let underrun = false;
        for (let i = 0; i < out.length; i++) {
            if (readIdx !== writeIdx) {
                lastSample = ring[readIdx];
                out[i] = lastSample;
                readIdx = (readIdx + 1) & (RING_SIZE - 1);
            } else {
                lastSample *= 0.997; // fade to silence on underrun
                out[i] = lastSample;
                underrun = true;
            }
        }
        if (underrun) {
            setLed(rxLed, false);
            // bump only on leading edge of each underrun period, not for every callback while starved
            if (!inUnderrun) audioBufTarget = Math.min(MAX_BUF, audioBufTarget + SP_FRAMES * 4);
            inUnderrun = true;
        } else {
            inUnderrun = false;
        }
        // slow decay back toward minimum (~100s from 500ms to min, so spotty links stay buffered)
        audioBufTarget = Math.max(MIN_BUF, audioBufTarget - 4);
        videoDelayMs = Math.round(audioBufTarget / AUDIO_RATE * 1000);
    };
    playProc.connect(audioCtx.destination);
    log_always('audio playback ready');
}
// auto-start playback on any first user interaction
document.addEventListener('click', () => ensureAudioCtx().catch(() => {}), { once: true });

// -- start camera + mic (called on first Unmute Mic) --------------------------
async function startCameraAndMic() {
    await ensureAudioCtx();
    if (!camStream) {
        try {
            camStream = await navigator.mediaDevices.getUserMedia({
                video: { width:{ max:640 }, height:{ max:640 }, frameRate:{ ideal:24, max:30 } },
                audio: { channelCount:1, sampleRate:48000,
                         echoCancellation:echoCancel, noiseSuppression:noiseSuppress, autoGainControl:autoGain }
            });
        } catch(e) { log_always('getUserMedia failed:', e.message || e); return false; }

        localVideo.srcObject = camStream;
        const vt = camStream.getVideoTracks()[0];
        const s  = vt.getSettings();
        let encW = s.width  || 320;
        let encH = s.height || 240;
        const FPS = s.frameRate || 24;
        const KEYFRAME_EVERY = Math.max(1, Math.round(FPS / 2));
        log_always('camera:', encW, 'x', encH, '@', FPS, 'fps  keyframe every', KEYFRAME_EVERY);
        fitEl(localVideo, encW, encH);

        function configureEncoder(w, h) {
            encoder.configure({ codec:'vp8', width:w, height:h, bitrate:200_000, framerate:FPS });
            encW = w; encH = h; sendW = w; sendH = h; frameCount = 0;
        }

        // video encoder
        if ('VideoEncoder' in window) {
            encoder = new VideoEncoder({
                output: chunk => {
                    if (videoMuted || socket.readyState !== WebSocket.OPEN || !their_ed25519.value) return;
                    const data = new Uint8Array(chunk.byteLength);
                    chunk.copyTo(data);
                    (chunk.type === 'key' ? keyframeBits : deltaframeBits).push({ t: Date.now(), bytes: chunk.byteLength });
                    videoSeqSent++;
                    log('video', chunk.type, chunk.byteLength+'B seq'+videoSeqSent);
                    const vmsgs = [{VideoFrame:{ codec:'vp8', keyframe: chunk.type==='key',
                                                 seq: videoSeqSent, w: encW, h: encH,
                                                 data: u8toB64(data) }}];
                    if (++videoFramesSent % 5 === 0) {
                        const seq = ++videoPingSeq;
                        pendingVideoPings.set(seq, Date.now());
                        vmsgs.push({VideoPing:{seq, t: Date.now()}});
                    }
                    socket.send(JSON.stringify([{Forward:{
                        to_ed25519: their_ed25519.value,
                        messages: vmsgs
                    }}]));
                },
                error: e => log_always('video encoder err:', e.message || e)
            });
            try { configureEncoder(encW, encH); }
            catch(e) { log_always('VideoEncoder configure failed:', e.message || e); encoder = null; }
        }

        if (encoder) {
            const proc = new MediaStreamTrackProcessor({ track: vt });
            frameReader = proc.readable.getReader();
            (async () => {
                while (true) {
                    let r;
                    try { r = await frameReader.read(); } catch { break; }
                    if (r.done) break;
                    const frame = r.value;
                    if (videoMuted) { frame.close(); continue; }
                    // reconfigure if phone rotated
                    if (frame.codedWidth !== encW || frame.codedHeight !== encH) {
                        log_always('rotation:', frame.codedWidth, 'x', frame.codedHeight);
                        try { await encoder.flush(); } catch {}
                        configureEncoder(frame.codedWidth, frame.codedHeight);
                        fitEl(localVideo, frame.codedWidth, frame.codedHeight);
                    }
                    if (encoder.encodeQueueSize > 2) { frame.close(); continue; }
                    const keyFrame = (frameCount % KEYFRAME_EVERY === 0);
                    try { encoder.encode(frame, { keyFrame }); } catch(e) { log_always('encode err:', e); }
                    frame.close();
                    frameCount++;
                }
            })();
        }

        decoder = makeDecoder();
        needKeyframe = true;
        muteVideoBtn.disabled = false;
    }

    // audio encoder
    if (!audioEncoder) {
        audioEncoder = new AudioEncoder({
            output: chunk => {
                if (!micActive || socket.readyState !== WebSocket.OPEN || !their_ed25519.value) return;
                const data = new Uint8Array(chunk.byteLength);
                chunk.copyTo(data);
                offset_sent++;
                const amsgs = [{AudioFrame:{ sampleRate:48000, channels:1, format:'opus',
                                             data: u8toB64(data), offset: offset_sent }}];
                if (++audioFramesSent % 5 === 0) {
                    const seq = ++audioPingSeq;
                    pendingAudioPings.set(seq, Date.now());
                    amsgs.push({AudioPing:{seq, t: Date.now()}});
                }
                socket.send(JSON.stringify([{Forward:{
                    to_ed25519: their_ed25519.value,
                    messages: amsgs
                }}]));
            },
            error: e => log_always('audio encoder err:', e.message || e)
        });
        audioEncoder.configure({ codec:'opus', sampleRate:48000, numberOfChannels:1, bitrate:32000 });
        log_always('audio: Opus 32kbps');
    }

    // mic -> processor
    if (!recordProc) {
        micSrc = audioCtx.createMediaStreamSource(camStream);
        recordProc = audioCtx.createScriptProcessor(SP_FRAMES, 1, 1);
        recordProc.onaudioprocess = e => {
            const input = e.inputBuffer.getChannelData(0);
            // VU meter runs even when muted
            let rms = 0;
            for (let i = 0; i < input.length; i++) rms += input[i] * input[i];
            setVU(Math.min(1, Math.sqrt(rms / input.length) * 6));

            if (!micActive || socket.readyState !== WebSocket.OPEN || !their_ed25519.value) return;
            audioTsCounter += input.length;
            const ad = new AudioData({
                format: 'f32-planar', sampleRate: 48000,
                numberOfFrames: input.length, numberOfChannels: 1,
                timestamp: audioTsCounter,
                data: new Float32Array(input)
            });
            audioEncoder.encode(ad);
            ad.close();
        };
        micSrc.connect(recordProc);
        recordProc.connect(audioCtx.destination);
    }
    return true;
}

// -- mic mute button ----------------------------------------------------------
muteAudioBtn.onclick = async () => {
    if (!micActive) {
        const ok = await startCameraAndMic();
        if (!ok) return;
        micActive = true;
        setLed(recLed, true);
        muteAudioBtn.textContent = 'Mute Mic';
    } else {
        micActive = false;
        setLed(recLed, false);
        muteAudioBtn.textContent = 'Unmute Mic';
        setVU(0);
    }
};

// -- video mute button --------------------------------------------------------
muteVideoBtn.onclick = async () => {
    if (!camStream) {
        const ok = await startCameraAndMic();
        if (!ok) return;
    }
    videoMuted = !videoMuted;
    muteVideoBtn.textContent = videoMuted ? 'Unmute Video' : 'Mute Video';
    if (!videoMuted) frameCount = 0; // force keyframe on unmute
};

// -- audio processing toggles -------------------------------------------------
async function restartAudio() {
    if (!camStream) return;
    const wasActive = micActive;
    micActive = false;
    setLed(recLed, false);
    camStream.getAudioTracks().forEach(t => t.stop());
    if (recordProc) { recordProc.disconnect(); recordProc = null; }
    if (micSrc)     { micSrc.disconnect();     micSrc = null; }
    if (audioEncoder) { try { audioEncoder.close(); } catch {} audioEncoder = null; }
    try {
        const s = await navigator.mediaDevices.getUserMedia({
            audio: { channelCount:1, sampleRate:48000,
                     echoCancellation:echoCancel, noiseSuppression:noiseSuppress, autoGainControl:autoGain }
        });
        camStream.getAudioTracks().forEach(t => camStream.removeTrack(t));
        s.getAudioTracks().forEach(t => camStream.addTrack(t));
    } catch(e) { log_always('audio restart failed:', e.message || e); return; }
    await startCameraAndMic();
    if (wasActive) { micActive = true; setLed(recLed, true); muteAudioBtn.textContent = 'Mute Mic'; }
}

document.getElementById('echoCancelBtn').onclick = async () => {
    echoCancel = !echoCancel;
    document.getElementById('echoCancelBtn').textContent = echoCancel ? 'Echo: On' : 'Echo: Off';
    await restartAudio();
};
document.getElementById('noiseBtn').onclick = async () => {
    noiseSuppress = !noiseSuppress;
    document.getElementById('noiseBtn').textContent = noiseSuppress ? 'Noise: On' : 'Noise: Off';
    await restartAudio();
};
document.getElementById('gainBtn').onclick = async () => {
    autoGain = !autoGain;
    document.getElementById('gainBtn').textContent = autoGain ? 'Gain: On' : 'Gain: Off';
    await restartAudio();
};

// -- video reorder buffer helpers ---------------------------------------------
function decodeVideoFrame(vf) {
    if (needKeyframe && !vf.keyframe) return;
    if (vf.w && vf.h && (vf.w !== remoteCanvas.width || vf.h !== remoteCanvas.height)) {
        if (decoder && decoder.state !== 'closed') { try { decoder.close(); } catch {} }
        decoder = makeDecoder(vf.w, vf.h);
        remoteCanvas.width  = vf.w;
        remoteCanvas.height = vf.h;
        fitEl(remoteCanvas, vf.w, vf.h);
        needKeyframe = true;
        if (!vf.keyframe) return;
    }
    if (!decoder || decoder.state === 'closed') decoder = makeDecoder(vf.w, vf.h);
    try {
        decoder.decode(new EncodedVideoChunk({
            type: vf.keyframe ? 'key' : 'delta',
            timestamp: videoSeqRecv,
            data: b64ToU8(vf.data)
        }));
    } catch(e) { log_always('video decode err:', e.message || e); needKeyframe = true; }
}

function drainVideoPending() {
    for (;;) {
        if (!hasFirstVideo) {
            if (videoPending.size === 0) return;
            // bootstrap: accept whatever seq arrives first
            videoSeqRecv = Math.min(...videoPending.keys()) - 1;
            hasFirstVideo = true;
        }
        const next = videoSeqRecv + 1;
        if (videoPending.has(next)) {
            const { vf } = videoPending.get(next);
            videoPending.delete(next);
            videoSeqRecv = next;
            decodeVideoFrame(vf);
            continue;
        }
        if (videoPending.size === 0) return;
        // gap: wait up to videoDelayMs — the existing adaptive display buffer is exactly the slack we have
        const reorderMs = videoDelayMs;
        let minSeq = Infinity, oldestArrival = Infinity;
        for (const [seq, { arrivedAt }] of videoPending) {
            if (arrivedAt < oldestArrival) { oldestArrival = arrivedAt; minSeq = seq; }
        }
        if (Date.now() - oldestArrival < reorderMs) return; // still within window
        // gap expired: count truly missing frames as drops and skip
        const skipped = minSeq - next;
        if (skipped > 0) { videoDrops += skipped; lastVideoDropMs = Date.now(); }
        videoSeqRecv = minSeq - 1;
        needKeyframe = true;
        // loop continues: picks up minSeq on next iteration
    }
}

// -- audio reorder buffer helper ----------------------------------------------
function drainAudioPending() {
    for (;;) {
        if (!hasFirstAudio) {
            if (audioPending.size === 0) return;
            offset_received = Math.min(...audioPending.keys()) - 1;
            hasFirstAudio = true;
        }
        const next = offset_received + 1;
        if (audioPending.has(next)) {
            const { af } = audioPending.get(next);
            audioPending.delete(next);
            offset_received = next;
            if (audioDecoder && audioDecoder.state === 'configured') {
                try {
                    audioDecoder.decode(new EncodedAudioChunk({
                        type: 'key', timestamp: offset_received,
                        data: b64ToU8(af.data)
                    }));
                } catch(e) { log_always('audio decode err:', e.message || e); }
            }
            continue;
        }
        if (audioPending.size === 0) return;
        // gap: wait up to videoDelayMs — same adaptive buffer depth drives both
        let minOffset = Infinity, oldestArrival = Infinity;
        for (const [offset, { arrivedAt }] of audioPending) {
            if (arrivedAt < oldestArrival) { oldestArrival = arrivedAt; minOffset = offset; }
        }
        if (Date.now() - oldestArrival < videoDelayMs) return; // still within window
        // gap expired: count drops and skip (ring buffer will have silence for the gap)
        const skipped = minOffset - next;
        if (skipped > 0) { audioDrops += skipped; lastAudioDropMs = Date.now(); }
        offset_received = minOffset - 1;
        // loop continues: picks up minOffset on next iteration
    }
}

// -- WebSocket + receive (always on from page load) ---------------------------
let socket;
function connect() {
    log_always('ws connecting');
    socket = new WebSocket(ws_url_input.value);
    socket.onclose = () => { log_always('ws closed, reconnecting'); setTimeout(connect, 200); };
    socket.onopen = () => {
        let work = Promise.resolve();
        socket.onmessage = event => {
            work = work.then(() => {
                let outer, messages, src, forwarded = false;
                try { outer = JSON.parse(event.data); } catch(e) { log_always('parse err', e); return; }
                if ('Forwarded' in outer[0]) {
                    src = outer[0].Forwarded.from_ed25519;
                    forwarded = true;
                    // E: only accept frames from the peer we're calling
                    if (their_ed25519.value && src !== their_ed25519.value) return;
                    try { messages = JSON.parse(outer[0].Forwarded.messages); }
                    catch(e) { log_always('inner parse err', e); return; }
                } else {
                    messages = outer;
                }
                for (const msg of messages) {
                    log(JSON.stringify(msg));
                    if (!forwarded && 'YourEd25519' in msg) {
                        my_ed25519 = msg.YourEd25519.ed25519; update_links();
                    }
                    if (!forwarded && 'PleaseSignYourPub' in msg) {
                        my_ed25519 = msg.PleaseSignYourPub.ed25519; update_links();
                    }
                    if (forwarded && 'VideoFrame' in msg) {
                        const vf = msg.VideoFrame;
                        if (vf.codec !== 'vp8') continue;
                        if (vf.seq !== undefined) {
                            if (vf.seq <= videoSeqRecv) continue; // stale
                            if (!videoPending.has(vf.seq))
                                videoPending.set(vf.seq, { vf, arrivedAt: Date.now() });
                        } else {
                            decodeVideoFrame(vf); // no seq: decode directly
                        }
                        drainVideoPending();
                    }
                    if (forwarded && 'AudioFrame' in msg) {
                        const af = msg.AudioFrame;
                        if (af.format === 'opus' && af.sampleRate === 48000 && af.channels === 1
                                && af.offset > offset_received) {
                            if (!audioPending.has(af.offset))
                                audioPending.set(af.offset, { af, arrivedAt: Date.now() });
                            drainAudioPending();
                        }
                    }
                    if (forwarded && 'VideoPing' in msg) {
                        if (socket.readyState === WebSocket.OPEN)
                            socket.send(JSON.stringify([{Forward:{to_ed25519:src,
                                messages:[{VideoPong:{seq:msg.VideoPing.seq,t:msg.VideoPing.t}}]}}]));
                    }
                    if (forwarded && 'VideoPong' in msg) {
                        videoChartData[Math.floor(msg.VideoPong.t/CHART_MS_PER_COL)%CHART_W] = Date.now() - msg.VideoPong.t;
                        pendingVideoPings.delete(msg.VideoPong.seq);
                    }
                    if (forwarded && 'AudioPing' in msg) {
                        if (socket.readyState === WebSocket.OPEN)
                            socket.send(JSON.stringify([{Forward:{to_ed25519:src,
                                messages:[{AudioPong:{seq:msg.AudioPing.seq,t:msg.AudioPing.t,buf:videoDelayMs}}]}}]));
                    }
                    if (forwarded && 'AudioPong' in msg) {
                        const rtt = Date.now() - msg.AudioPong.t;
                        audioChartData[Math.floor(msg.AudioPong.t/CHART_MS_PER_COL)%CHART_W] = rtt;
                        lastAudioRtt = rtt;
                        lastRemoteBuf = msg.AudioPong.buf ?? null;
                        pendingAudioPings.delete(msg.AudioPong.seq);
                    }
                }
            });
        };
        new URLSearchParams(window.location.search).forEach((v, k) => {
            if (k === 'ed25519') { their_ed25519.value = v; update_links(); }
        });
    };
}
// -- video render loop (draws queued frames after videoDelayMs, then chart overlay) --
const statsEl = document.getElementById('stats');
(function renderLoop() {
    const now = Date.now();
    while (videoQueue.length && videoQueue[0].due <= now) {
        const { bm } = videoQueue.shift();
        if (lastVideoFrame) lastVideoFrame.close();
        lastVideoFrame = bm;
    }
    const ctx2d = remoteCanvas.getContext('2d');
    const cw = remoteCanvas.width, ch = remoteCanvas.height;
    if (lastVideoFrame) ctx2d.drawImage(lastVideoFrame, 0, 0);

    // advance chart cursor, clearing stale columns
    const nowCol = Math.floor(now / CHART_MS_PER_COL) % CHART_W;
    if (nowCol !== latChartCursor) {
        let c = latChartCursor;
        while (c !== nowCol) {
            c = (c + 1) % CHART_W;
            audioChartData[c] = null;
            videoChartData[c] = null;
        }
        audioChartData[(nowCol + 1) % CHART_W] = null;
        videoChartData[(nowCol + 1) % CHART_W] = null;
        latChartCursor = nowCol;
    }

    // draw chart overlay — blue=video RTT, amber=audio RTT, no background
    if (cw > 0 && ch > 0) {
        for (let c = 0; c < CHART_W; c++) {
            const x  = Math.round(c       * cw / CHART_W);
            const x1 = Math.round((c + 1) * cw / CHART_W);
            const bw = Math.max(1, x1 - x);
            if (videoChartData[c] !== null) {
                const barH = Math.min(ch, Math.round(videoChartData[c] * ch / CHART_MAX_RTT));
                ctx2d.fillStyle = 'rgba(30,160,255,0.55)';
                ctx2d.fillRect(x, ch - barH, bw, barH);
            }
            if (audioChartData[c] !== null) {
                const barH = Math.min(ch, Math.round(audioChartData[c] * ch / CHART_MAX_RTT));
                ctx2d.fillStyle = 'rgba(255,160,0,0.65)';
                ctx2d.fillRect(x, ch - barH, bw, barH);
            }
        }
    }
    requestAnimationFrame(renderLoop);
})();

const TIP_BUF = `Adaptive jitter buffer target. Grows by ~43ms on any audio underrun (even one too small to hear), then slowly decays back to ~11ms minimum over ~100s. Also delays video by the same amount to keep A/V in sync.`;
const TIP_RING = `Current audio buffer depth — milliseconds of decoded audio queued and waiting to play. When this hits zero the buffer underruns and buf\u00a0target increases.`;

function tipHtml(label, tip) {
    return `<span class="tip-wrap">${label}<span class="tip">${tip}</span></span>`;
}

setInterval(() => {
    drainVideoPending(); // expire stale pending frames if no new frames are arriving
    drainAudioPending();
    const now = Date.now();
    const ago = ms => ms ? Math.round((now - ms)/1000)+'s ago' : 'never';
    const sr = sendW && sendH ? sendW+'x'+sendH : '--';
    const rr = remoteCanvas.width && remoteCanvas.height ? remoteCanvas.width+'x'+remoteCanvas.height : '--';
    const ringDepth = (writeIdx - readIdx + RING_SIZE) & (RING_SIZE - 1);
    const rttStr = lastAudioRtt !== null ? lastAudioRtt+'ms' : '--';
    const remoteBufStr = lastRemoteBuf !== null ? lastRemoteBuf+'ms' : '--';
    const est1way = (lastAudioRtt !== null && lastRemoteBuf !== null)
        ? Math.round(lastAudioRtt / 2 + lastRemoteBuf)+'ms' : '--';
    const estTotal = (lastAudioRtt !== null && lastRemoteBuf !== null)
        ? Math.round(lastAudioRtt / 2 + lastRemoteBuf + videoDelayMs)+'ms' : '--';
    const bpsFloor = now - BPS_WINDOW_MS;
    while (keyframeBits.length   && keyframeBits[0].t   < bpsFloor) keyframeBits.shift();
    while (deltaframeBits.length && deltaframeBits[0].t < bpsFloor) deltaframeBits.shift();
    const keyBps   = Math.round(keyframeBits.reduce((s, x)   => s + x.bytes, 0) * 8 / (BPS_WINDOW_MS / 1000));
    const deltaBps = Math.round(deltaframeBits.reduce((s, x) => s + x.bytes, 0) * 8 / (BPS_WINDOW_MS / 1000));
    const fmtBps = n => n >= 1000 ? (n/1000).toFixed(1)+'kbps' : n+'bps';
    statsEl.innerHTML =
        `send: ${sr}  recv: ${rr}  ${tipHtml('buf target', TIP_BUF)}: ${videoDelayMs}ms  ${tipHtml('ring', TIP_RING)}: ${Math.round(ringDepth/AUDIO_RATE*1000)}ms\n` +
        `net RTT: ${rttStr}  remote buf: ${remoteBufStr}  est 1-way: ${est1way}  est total: ${estTotal}\n` +
        `video key: ${fmtBps(keyBps)}  delta: ${fmtBps(deltaBps)}  (5s avg, raw VP8)\n` +
        `video loss: ${videoDrops}  last: ${ago(lastVideoDropMs)}\n` +
        `audio loss: ${audioDrops}  last: ${ago(lastAudioDropMs)}`;
}, 1000);

// tap to toggle tooltips on touchscreens
document.addEventListener('click', e => {
    const wrap = e.target.closest('.tip-wrap');
    document.querySelectorAll('.tip-wrap.tip-open').forEach(el => { if (el !== wrap) el.classList.remove('tip-open'); });
    if (wrap) { wrap.classList.toggle('tip-open'); e.stopPropagation(); }
});

connect();
</script>
