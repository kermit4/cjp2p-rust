<html><head><title>real time chat over CJP2P</title></head>
        <body>
<br>their ed25519 addr<input id=their_ed25519 size=80>
        <p>Give this URL to the other person to chat with you:
        <p><a id=link href="" ></a>

<br>
            <p><a href=/>return to network status page</a>
<div id="led" class="led off"></div>
    <style>
    .led {
          width: 16px;
          height: 16px;
          border-radius: 50%;
          border: 1px solid #222;
          background: #400; /* dark red = off */
          box-shadow: inset 0 0 4px #000;
          transition: background 0.1s, box-shadow 0.1s;
    }
.led.on {
      background: #f00; /* bright red = on */
      box-shadow: 0 0 8px #f00, /* glow */
                      inset 0 0 4px #fff8; /* highlight */
}
</style>

<br>
debuging :
<button onclick="logging=true">enable </button> (then scroll down)
<button onclick="logging=false">disable </button>

<button id="start">Start</button>
<button id="stop" disabled>Stop</button>
<script>
let audioCtx;
let recordNode, playNode, micStream;
let playBuffer = [];
let lastSample = 0; // for underrun fade
const startBtn = document.getElementById('start');
const stopBtn = document.getElementById('stop');
const led = document.getElementById('led');

const FRAME = 512;

// AudioWorklet processors as a blob so we don't need a separate file.
// PlayWorklet: internal ring buffer fed via port.postMessage, outputs 128-sample quanta.
// RecordWorklet: accumulates FRAME samples then posts to main thread for sending.
const workletCode = `
class PlayWorklet extends AudioWorkletProcessor {
  constructor() {
    super();
    const SIZE = 8192;
    this._ring = new Float32Array(SIZE);
    this._w = 0; this._r = 0;
    this._last = 0;
    this._playing = false;
    this.port.onmessage = ({data}) => {
      const f32 = data;
      for (let i = 0; i < f32.length; i++) {
        this._ring[this._w] = f32[i];
        this._w = (this._w + 1) & (SIZE - 1);
        if (this._w === this._r) {
          this.port.postMessage({type:'overflow'});
          this._r = (this._r + 48*20) & (SIZE - 1);
        }
      }
    };
  }
  process(inputs, outputs) {
    const out = outputs[0][0];
    let playing = false;
    for (let i = 0; i < out.length; i++) {
      if (this._r !== this._w) {
        this._last = this._ring[this._r];
        out[i] = this._last;
        this._r = (this._r + 1) & 8191;
        playing = true;
      } else {
        this._last *= 0.997;
        out[i] = this._last;
      }
    }
    if (playing !== this._playing) {
      this._playing = playing;
      this.port.postMessage({type: playing ? 'playing' : 'underrun'});
    }
    return true;
  }
}
registerProcessor('play-worklet', PlayWorklet);

class RecordWorklet extends AudioWorkletProcessor {
  constructor() {
    super();
    this._buf = new Float32Array(${FRAME});
    this._n = 0;
  }
  process(inputs) {
    const inp = inputs[0]?.[0];
    if (!inp) return true;
    for (let i = 0; i < inp.length; i++) {
      this._buf[this._n++] = inp[i];
      if (this._n === ${FRAME}) {
        this.port.postMessage(this._buf.slice(0));
        this._n = 0;
      }
    }
    return true;
  }
}
registerProcessor('record-worklet', RecordWorklet);
`;

function base64ToArrayBuffer(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

    const logBox = document.createElement('div');
    logBox.id = 'log';
    logBox.style.cssText = 'font-family:monospace; font-size:12px; padding:8px; white-space:pre-wrap; word-break:break-all;';
    document.body.appendChild(logBox); // safe, no reset
    const logDiv = document.createElement('div');
    logDiv.id = 'log';
    logDiv.style.cssText = 'position:fixed; bottom:0; left:0; right:0; max-height:30vh; overflow:auto; background:#111; color:#0f0; font-family:monospace; font-size:12px; padding:4px; z-index:9999;';

    let logging=false;
    let logQueue = Promise.resolve();

    function log_always(...args) {
        const line = document.createElement('div');
        logQueue = logQueue.then(() => {
            line.textContent = `[${new Date().toLocaleTimeString()}] ${args.join(' ')}`;
                logBox.appendChild(line);
                while (logBox.children.length > 2000) {
                  logBox.removeChild(logBox.firstChild);
                }
                // window.scrollTo(0, document.body.scrollHeight);
            });
        }
    function log(...args) {
        if (logging)
            log_always(args);
    }

    document.body.appendChild(logDiv);
    const their_ed25519 =   document.getElementById('their_ed25519');
    const link = document.getElementById('link');
    function update_links() {
        let url=location.origin+location.pathname;
        url += "?ed25519=" + my_ed25519;
        link.href = url;
        link.textContent = url;
    }
    function set_their_ed25519(ed25519) {
        their_ed25519.value=ed25519;
        update_links();
    }

    let my_ed25519 = null;

    function str(obj) {
      if (obj instanceof Error) return `${obj.name}: ${obj.message}`;
      try { return JSON.stringify(obj, null, 2); }
      catch { return String(obj); }
    }
    window.onerror = (msg, url, line, col, err) => {
      log_always('ERROR:', msg, 'at', url + ':' + line + ':' + col);
      if (err && err.stack)
        log_always(err.stack);
        return false;
    };
    window.onunhandledrejection = e => {
      log_always('UNHANDLED PROMISE:', e.reason?.stack || e.reason || e);
    };

    ['log', 'warn', 'error', 'info'].forEach(k => {
      const orig = console[k].bind(console);
      console[k] = (...args) => {
        orig.apply(console, args); // still goes to real console if you have one
        log_always(k.toUpperCase() + ':',...args);
      };
    });

    const url = new URL('/wt', window.location.href);
    url.protocol = url.protocol.replace('http', 'ws');
    let socket;

	function connect() {
		log("websocket connencting");
		socket = new WebSocket("ws://localhost:24255/wt");
        socket.onclose = () => {
            log('Socket closed. Reconnecting ...');
            setTimeout(connect, 200);
        };
		socket.onopen = async() => {
			let work = Promise.resolve();
			socket.onmessage = async(event) => {
				work = work.then(async () => {
					log( "\n\n___________________n\n");
					log(event.data);
					let messages_ = JSON.parse(event.data);
					let messages;
					log( "\n\n==============\n\n");
					let src=null;
					let forwarded=false;
					if ("Forwarded" in messages_[0]) {
						src=messages_[0].Forwarded.from_ed25519;
						forwarded=true;
						messages = JSON.parse(messages_[0].Forwarded.messages);
						log( "\n" + messages_[0].Forwarded.messages);
					} else messages=messages_;
					log( "\n");
					for (i in messages) {
						let msg = messages[i]
						log("\n" + JSON.stringify(msg));
						if ("AudioFrame" in msg)  {
                            af=msg.AudioFrame;
                            if (audioCtx != null && af.sampleRate== 48000 && af.channels== 1 && af.format=='f32' ) {
								const u8 = b64ToU8(af.data);
								const f32 = new Float32Array(u8.buffer, u8.byteOffset, u8.byteLength / 4);
                                led.classList.toggle('on', true);
                                if (playNode) {
                                    const f32copy = f32.slice(0);
                                    playNode.port.postMessage(f32copy, [f32copy.buffer]);
                                }
							}
						}
						if (!forwarded && "YourEd25519" in msg) {
							my_ed25519 = msg.YourEd25519.ed25519
							update_links();
						}
						if (!forwarded && "PleaseSignYourPub" in msg) {
							my_ed25519 = msg.PleaseSignYourPub.ed25519
							update_links();
						}
					}
				});
			};
			const params = new URLSearchParams(window.location.search)
			params.forEach(function(v,k)  {
				log_always("url parse: ",k,"=",v);
				switch (k) {
					case "ed25519":
						set_their_ed25519(v);
				}
			});
		}
	}
	connect();
    their_ed25519.addEventListener('input', () => {
        input.readOnly = false;
        update_links();
    });

startBtn.onclick = async () => {

	audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000, latencyHint: 'interactive' });
	await audioCtx.resume();
    try {
	micStream = await navigator.mediaDevices.getUserMedia({
		audio: {
		  channelCount: 1,
		  sampleRate: 48000,
		  echoCancellation: false,
		  noiseSuppression: false,
		  autoGainControl: false
		}
	  });
        let _at = micStream.getAudioTracks();
        let atb = _at[0];
        let atbs = atb.getSettings();
log_always("channelCount:",atbs.channelCount);
log_always("sampleRate:",atbs.sampleRate);
log_always("echoCancellation:",atbs.echoCancellation);
log_always("noiseSuppression:",atbs.noiseSuppression);
log_always("autoGainControl:",atbs.autoGainControl);

    // Load worklet processors from a blob URL so no extra file is needed.
    const blob = new Blob([workletCode], {type: 'application/javascript'});
    const blobUrl = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(blobUrl);
    URL.revokeObjectURL(blobUrl);

    playNode = new AudioWorkletNode(audioCtx, 'play-worklet');
    playNode.port.onmessage = ({data}) => {
        if (data.type === 'overflow') {
            if (startBtn.disabled)
                log_always("playback slower than source skipping ahead 20ms");
        } else if (data.type === 'underrun') {
            led.classList.toggle('on', false);
        }
    };
    playNode.connect(audioCtx.destination);

    recordNode = new AudioWorkletNode(audioCtx, 'record-worklet', {numberOfOutputs: 1});
    recordNode.port.onmessage = ({data}) => {
        if (socket.readyState !== WebSocket.OPEN) return;
        const u8 = new Uint8Array(data.buffer);
        const b64 = u8toB64(u8);
        socket.send(JSON.stringify([{Forward:{to_ed25519:their_ed25519.value,messages:[{AudioFrame:{
            sampleRate: 48000,
            channels: 1,
            format: 'f32',
            data: b64,
        }}]}}]));
    };

    const source = audioCtx.createMediaStreamSource(micStream);
    source.connect(recordNode);
    // recordNode output is unconnected; process() returning true keeps it alive.

  startBtn.disabled = true;
  stopBtn.disabled = false;
    }
    catch (e) {
        log_always("caught ",e);
    }
};

stopBtn.onclick = () => {
  recordNode?.disconnect();
  playNode?.disconnect();
  micStream?.getTracks().forEach(t => t.stop());
  audioCtx?.close();
  playBuffer = [];
  lastSample = 0;
  startBtn.disabled = false;
  stopBtn.disabled = true;
};
function u8toB64(u8) {
  let binary = '';
  const chunk = 0x8000; // 32KB chunks. iOS dies above ~64KB args
  for (let i = 0; i < u8.length; i += chunk) {
    binary += String.fromCharCode.apply(null, u8.subarray(i, i + chunk));
  }
  return btoa(binary);
}

function b64ToU8(b64) {
  const bin = atob(b64);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

</script>
    </body>
</html>
